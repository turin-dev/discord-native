<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discord Native UI contract</title>
    <style>
      :root {
        color-scheme: dark;
        --window: #0a1e2e;
        --rail: #0c0c0c;
        --sidebar: #061027;
        --footer: #071521;
        --chat: #050e23;
        --input: #04052b;
        --hover: #151c2d;
        --selected: #181f30;
        --divider: #071521;
        --brand: #5865f2;
        --text: #f2f3f5;
        --normal: #dbdee1;
        --muted: #b5bac1;
        --faint: #949ba4;
        --positive: #23a559;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-width: 1100px;
        min-height: 100vh;
        overflow: hidden;
        background: var(--window);
        color: var(--normal);
        font: 14px/1.35 "Segoe UI", sans-serif;
      }
      .titlebar {
        height: 32px;
        display: grid;
        grid-template-columns: 1fr 260px 1fr;
        align-items: center;
        padding: 0 12px;
        color: var(--faint);
        font-size: 12px;
      }
      .search { height: 24px; padding: 4px 10px; border-radius: 6px; background: var(--input); }
      .right { text-align: right; letter-spacing: 8px; }
      .shell { height: calc(100vh - 32px); display: flex; }
      .rail { width: 72px; padding-top: 8px; background: var(--rail); }
      .guild {
        width: 48px; height: 48px; margin: 0 auto 8px; display: grid; place-items: center;
        border-radius: 24px; background: var(--chat); color: var(--text); font-weight: 700;
      }
      .guild.active { position: relative; border-radius: 16px; background: var(--brand); }
      .guild.active::before {
        content: ""; position: absolute; left: -12px; width: 4px; height: 40px;
        border-radius: 0 4px 4px 0; background: white;
      }
      .sidebar { width: 320px; display: flex; flex-direction: column; background: var(--sidebar); }
      .server, .channel-header {
        height: 48px; display: flex; align-items: center; padding: 0 12px;
        border-bottom: 1px solid var(--divider); color: var(--text); font-weight: 700;
      }
      .dm-search { height: 48px; padding: 8px 10px; border-bottom: 1px solid var(--divider); }
      .dm-search div { height: 32px; padding: 7px 10px; border-radius: 4px; background: var(--input); color: var(--faint); font-size: 12px; }
      .channels { flex: 1; padding: 12px 8px; }
      .section { margin: 8px 4px 4px; color: var(--faint); font-size: 11px; font-weight: 700; }
      .channel { height: 44px; display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 4px; color: var(--muted); }
      .channel.active { background: var(--selected); color: var(--text); }
      .channel.unread { color: var(--normal); font-weight: 700; }
      .channel .avatar { width: 32px; height: 32px; flex: 0 0 32px; }
      .badge { margin-left: auto; padding: 1px 6px; border-radius: 10px; background: #f23f42; color: white; font-size: 10px; }
      .user { height: 52px; display: flex; align-items: center; gap: 8px; padding: 6px 8px; background: var(--footer); }
      .avatar { width: 34px; height: 34px; display: grid; place-items: center; border-radius: 50%; background: #e67e22; color: white; font-weight: 700; }
      .user small { display: block; color: var(--faint); }
      .chat { min-width: 360px; flex: 1; display: flex; flex-direction: column; background: var(--chat); }
      .topic { margin-left: 12px; color: var(--faint); font-size: 12px; font-weight: 400; }
      .messages { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px 16px 6px; }
      .message { position: relative; display: grid; grid-template-columns: 42px 1fr; padding: 6px 8px; border-radius: 4px; }
      .message:hover { background: var(--hover); }
      .message .avatar { width: 40px; height: 40px; }
      .name { color: #e78284; font-weight: 700; }
      time { margin-left: 6px; color: var(--faint); font-size: 11px; }
      .actions { position: absolute; right: 10px; top: -14px; padding: 6px 9px; border: 1px solid var(--divider); border-radius: 4px; background: var(--sidebar); color: var(--muted); }
      .composer { height: 64px; padding: 8px 16px 16px; }
      .composer div { height: 40px; padding: 10px 14px; border-radius: 8px; background: var(--input); color: var(--faint); }
      .members { width: 240px; padding: 0 8px 12px; background: var(--chat); }
      .members h2 { margin: 4px 8px 8px; color: var(--faint); font-size: 11px; }
      .member { display: flex; align-items: center; gap: 8px; height: 44px; padding: 4px 8px; color: var(--muted); }
      .member .avatar { width: 32px; height: 32px; background: #5865f2; }
      .online { color: var(--positive); font-size: 10px; }
    </style>
  </head>
  <body>
    <header class="titlebar"><span>◉ discord_native</span><div class="search">⌕ 대화 찾기</div><span class="right">▣ ?</span></header>
    <main class="shell">
      <nav class="rail"><div class="guild active">◉</div><div class="guild">DN</div><div class="guild">DEV</div></nav>
      <aside class="sidebar">
        <div class="dm-search"><div>대화 찾기 또는 시작하기</div></div>
        <div class="channels"><div class="channel">♟　친구</div><div class="section">다이렉트 메시지</div><div class="channel"><div class="avatar">B</div>Bob</div><div class="channel active"><div class="avatar">P</div>프로젝트방</div><div class="channel unread"><div class="avatar">C</div>Carol <span class="badge">3</span></div></div>
        <div class="user"><div class="avatar">A</div><div><strong>Alice</strong><small>연결됨</small></div><span>♩ ◉ ⚙</span></div>
      </aside>
      <section class="chat">
        <div class="channel-header">♟&nbsp; 프로젝트방</div>
        <div class="messages">
          <article class="message"><div class="avatar">B</div><div><span class="name">Bob</span><time>오후 10:04</time><br />DM 사용자와 그룹 멤버가 실제 READY 데이터로 표시돼요.</div></article>
          <article class="message"><div class="avatar">A</div><div><span class="name">Alice</span><time>오후 10:05</time><span class="actions">↩　♧　•••</span><br />헤더와 입력창에서도 채널용 # 표시가 사라졌어요.</div></article>
        </div>
        <div class="composer"><div>⊕　프로젝트방에 메시지 보내기　　　　　　　　☺</div></div>
      </section>
      <aside class="members"><div class="channel-header">멤버 — 3</div><div class="member"><div class="avatar">A</div><span>Alice <span class="online">●</span></span></div><div class="member"><div class="avatar">B</div><span>Bob <span class="online">●</span></span></div><div class="member"><div class="avatar">C</div><span>Carol</span></div></aside>
    </main>
  </body>
</html>
