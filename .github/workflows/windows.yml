name: Windows CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: stable
          cache: true
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Resolve dependencies
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test with coverage
        run: flutter test --coverage
      - name: Enforce 80 percent coverage
        run: dart run tool/check_coverage.dart coverage/lcov.info --minimum=80
      - name: Build Windows release
        run: flutter build windows --release --split-debug-info=build/symbols/windows
      - name: Subset Material icons
        shell: pwsh
        run: ./tool/subset_material_icons.ps1
      - name: Measure Windows release
        shell: pwsh
        run: ./tool/benchmark_windows.ps1
      - name: Upload portable release
        uses: actions/upload-artifact@v7
        with:
          name: discord-native-windows-x64
          path: |
            build/windows/x64/runner/Release/
            benchmark-results/windows-release.json
          if-no-files-found: error
          retention-days: 14
      - name: Install Inno Setup
        if: startsWith(github.ref, 'refs/tags/v')
        run: choco install innosetup --no-progress -y
      - name: Build signed updater package
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          UPDATE_FEED: ${{ secrets.DISCORD_NATIVE_UPDATE_FEED }}
          DSA_PUBLIC_KEY: ${{ secrets.WINSPARKLE_DSA_PUBLIC_KEY }}
          DSA_PRIVATE_KEY: ${{ secrets.WINSPARKLE_DSA_PRIVATE_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:UPDATE_FEED)) { throw 'DISCORD_NATIVE_UPDATE_FEED secret is required.' }
          if ([string]::IsNullOrWhiteSpace($env:DSA_PUBLIC_KEY)) { throw 'WINSPARKLE_DSA_PUBLIC_KEY secret is required.' }
          if ([string]::IsNullOrWhiteSpace($env:DSA_PRIVATE_KEY)) { throw 'WINSPARKLE_DSA_PRIVATE_KEY secret is required.' }
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $publicKey = Join-Path $env:RUNNER_TEMP 'dsa_pub.pem'
          $privateKey = Join-Path $env:RUNNER_TEMP 'dsa_priv.pem'
          try {
            [IO.File]::WriteAllText($publicKey, $env:DSA_PUBLIC_KEY)
            [IO.File]::WriteAllText($privateKey, $env:DSA_PRIVATE_KEY)
            ./tool/package_windows.ps1 -Version $version -BuildNumber $env:GITHUB_RUN_NUMBER -UpdateFeedUrl $env:UPDATE_FEED -DsaPublicKeyPath $publicKey
            $installer = Get-ChildItem dist -Filter '*-setup.exe' | Select-Object -First 1
            $downloadUrl = [Uri]::new([Uri]$env:UPDATE_FEED, $installer.Name).AbsoluteUri
            ./tool/sign_windows_update.ps1 -InstallerPath $installer.FullName -PrivateKeyPath $privateKey -Version $version -DownloadUrl $downloadUrl
          } finally {
            Remove-Item -LiteralPath $publicKey, $privateKey -Force -ErrorAction SilentlyContinue
          }
      - name: Upload installer and appcast
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: discord-native-${{ github.ref_name }}-signed
          path: dist/
          if-no-files-found: error
          retention-days: 30
