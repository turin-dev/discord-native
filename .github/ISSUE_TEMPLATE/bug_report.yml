name: 버그 신고
description: 재현 가능한 오류를 알려 주세요.
title: "[Bug]: "
labels: [bug, triage]
body:
  - type: checkboxes
    attributes:
      label: 사전 확인
      options:
        - label: 기존 issue를 검색했습니다.
          required: true
        - label: 토큰과 개인정보를 제거했습니다.
          required: true
  - type: input
    id: commit
    attributes:
      label: 버전 또는 commit
      placeholder: main 또는 commit SHA
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: 환경
      placeholder: Windows 11 24H2, Flutter 3.41.9
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: 재현 절차
      description: 최소한의 순서로 작성해 주세요.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 예상 동작
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 동작과 민감정보를 제거한 로그
    validations:
      required: true
